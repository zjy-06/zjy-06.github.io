<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🔓 终极通道</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            padding: 20px;
        }
        .phone {
            width: 100%;
            max-width: 420px;
            min-height: 700px;
            background: linear-gradient(145deg, #0d0d1a, #1a0a2e);
            border-radius: 40px;
            padding: 30px 24px 30px;
            position: relative;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.9);
            overflow: hidden;
            border: 1px solid rgba(255, 200, 0, 0.10);
        }
        .page {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 640px;
            animation: fadeIn 0.8s ease;
            position: relative;
            z-index: 2;
        }
        .page.active {
            display: flex;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        @keyframes glitchText {
            0% { transform: translate(0, 0) skewX(0deg); }
            20% { transform: translate(-2px, 1px) skewX(2deg); }
            40% { transform: translate(2px, -1px) skewX(-2deg); }
            60% { transform: translate(-1px, 2px) skewX(1deg); }
            80% { transform: translate(1px, -2px) skewX(-1deg); }
            100% { transform: translate(0, 0) skewX(0deg); }
        }
        @keyframes scanline {
            0% { top: -10%; }
            100% { top: 110%; }
        }

        /* ===== 页面1 ===== */
        #page1 .glow-text {
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 40px rgba(255, 200, 0, 0.5), 0 0 80px rgba(255, 200, 0, 0.2);
            text-align: center;
            line-height: 1.5;
            margin-bottom: 8px;
        }
        #page1 .glow-text .highlight {
            color: #ffd700;
        }
        #page1 .sub-text {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.45);
            text-align: center;
            line-height: 1.8;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }
        #page1 .sub-text .emoji-big {
            font-size: 72px;
            display: block;
            margin: 10px auto 8px;
        }
        .arrow-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255, 200, 0, 0.12);
            border: 2px solid rgba(255, 200, 0, 0.35);
            color: #ffd700;
            font-size: 30px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
            user-select: none;
        }
        .arrow-btn:hover {
            background: rgba(255, 200, 0, 0.25);
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(255, 200, 0, 0.15);
        }
        .arrow-btn:active {
            transform: scale(0.9);
        }

        /* ===== 页面2：神秘符号（醒目版） ===== */
        #page2 .symbol-title {
            font-size: 20px;
            font-weight: 700;
            color: #ffd700;
            text-align: center;
            margin-bottom: 4px;
            text-shadow: 0 0 30px rgba(255, 200, 0, 0.15);
        }
        #page2 .symbol-sub {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
            text-align: center;
            letter-spacing: 4px;
            margin-bottom: 20px;
        }
        .symbol-box {
            width: 100%;
            background: rgba(255, 215, 0, 0.04);
            border-radius: 20px;
            padding: 30px 16px;
            border: 2px solid rgba(255, 215, 0, 0.12);
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(255, 200, 0, 0.03), inset 0 0 60px rgba(255, 200, 0, 0.02);
        }
        .symbol-box::before {
            content: '';
            position: absolute;
            left: 0;
            width: 100%;
            height: 2px;
            background: rgba(255, 200, 0, 0.15);
            animation: scanline 8s linear infinite;
        }
        .symbol-box .ornament {
            font-size: 12px;
            color: rgba(255, 200, 0, 0.15);
            letter-spacing: 8px;
            margin-bottom: 12px;
        }
        .symbol-box .ornament-bottom {
            font-size: 12px;
            color: rgba(255, 200, 0, 0.15);
            letter-spacing: 8px;
            margin-top: 12px;
        }
        .symbol-main {
            font-size: 22px;
            font-weight: 900;
            color: #ffd700;
            letter-spacing: 4px;
            text-shadow: 0 0 40px rgba(255, 200, 0, 0.2);
            animation: glitchText 3s infinite;
            font-family: 'Courier New', monospace;
            word-break: break-all;
            line-height: 1.6;
            background: rgba(255, 215, 0, 0.04);
            padding: 8px 4px;
            border-radius: 8px;
            border: 1px solid rgba(255, 215, 0, 0.04);
        }
        /* ★★★ 这里改醒目了 ★★★ */
        .symbol-hint {
            font-size: 15px;
            color: rgba(255, 255, 255, 0.7);
            margin-top: 16px;
            letter-spacing: 2px;
            line-height: 1.8;
        }
        .symbol-hint .highlight-gold {
            color: #ffd700;
            font-weight: 600;
        }
        .symbol-hint .source-line {
            font-size: 13px;
            color: rgba(255, 200, 0, 0.5);
            letter-spacing: 2px;
        }
        .symbol-hint .action-line {
            font-size: 14px;
            color: #ff6b9d;
            font-weight: 600;
            letter-spacing: 2px;
            margin-top: 4px;
            display: block;
        }
        .symbol-footer {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.08);
            text-align: center;
            letter-spacing: 2px;
            margin-top: 12px;
        }
        .copy-btn {
            padding: 14px 40px;
            background: rgba(255, 200, 0, 0.10);
            border: 1px solid rgba(255, 200, 0, 0.2);
            border-radius: 14px;
            color: #ffd700;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            letter-spacing: 2px;
        }
        .copy-btn:hover {
            background: rgba(255, 200, 0, 0.18);
            transform: scale(1.02);
            box-shadow: 0 0 40px rgba(255, 200, 0, 0.08);
        }
        .copy-btn:active {
            transform: scale(0.95);
        }

        /* ===== 页面3：提示 ===== */
        #page3 .hint-icon {
            font-size: 64px;
            margin-bottom: 8px;
        }
        #page3 .hint-title {
            font-size: 24px;
            font-weight: 900;
            color: #ffd700;
            text-shadow: 0 0 40px rgba(255, 200, 0, 0.2);
            text-align: center;
            margin-bottom: 4px;
        }
        #page3 .hint-sub {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.15);
            text-align: center;
            letter-spacing: 3px;
            margin-bottom: 16px;
        }
        .step-box {
            width: 100%;
            background: rgba(255, 215, 0, 0.04);
            border-radius: 16px;
            padding: 24px 20px;
            border: 1px solid rgba(255, 215, 0, 0.08);
            text-align: center;
            margin-bottom: 16px;
        }
        .step-box .step-label {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.1);
            letter-spacing: 2px;
            margin-bottom: 8px;
        }
        .step-box .step-line {
            font-size: 20px;
            font-weight: 700;
            color: #ffd700;
            line-height: 1.8;
        }
        .step-box .step-arrow {
            font-size: 28px;
            font-weight: 900;
            color: #ff6b9d;
            line-height: 1.8;
        }
        .step-box .step-symbol {
            font-size: 18px;
            font-weight: 700;
            color: #ffd700;
            background: rgba(255, 215, 0, 0.04);
            padding: 8px 16px;
            border-radius: 10px;
            display: inline-block;
            letter-spacing: 2px;
            font-family: 'Courier New', monospace;
            border: 1px solid rgba(255, 215, 0, 0.04);
        }
        .step-box .step-result {
            font-size: 15px;
            font-weight: 600;
            color: #00ffc8;
            margin-top: 10px;
        }
        #page3 .hint-footer {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.08);
            text-align: center;
            letter-spacing: 2px;
        }

        /* ===== Toast ===== */
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 200, 0, 0.12);
            color: #ffd700;
            padding: 10px 22px;
            border-radius: 12px;
            font-size: 13px;
            z-index: 999;
            opacity: 0;
            transition: opacity 0.4s ease;
            pointer-events: none;
            border: 1px solid rgba(255, 200, 0, 0.06);
            backdrop-filter: blur(8px);
        }
        .toast.show {
            opacity: 1;
        }
        .toast.success {
            background: rgba(0, 255, 180, 0.12);
            color: #00ffc8;
            border-color: rgba(0, 255, 180, 0.1);
        }
    </style>
</head>
<body>

    <div class="toast" id="toast"></div>

    <div class="phone">

        <!-- ===== 页面1 ===== -->
        <div id="page1" class="page active">
            <div class="glow-text">
                🎉 恭喜<span class="highlight">宿主</span>
            </div>
            <div class="glow-text" style="font-size:20px; font-weight:600; text-shadow:0 0 30px rgba(255,200,0,0.2); color:rgba(255,255,255,0.6); margin-top:-4px;">
                你找到了 <span style="color:#ffd700;">真正的通道</span>
            </div>
            <div class="sub-text">
                <span class="emoji-big">🔑</span>
                
                <br>
                这是一条 <span style="color:#ffd700;">隐藏路径</span>
                <br>
                <span style="font-size:12px; color:rgba(255,255,255,0.10);">只有真正的探索者才能走到这里</span>
            </div>
            <div class="arrow-btn" onclick="goToPage(2)">➜</div>
        </div>

        <!-- ===== 页面2：神秘符号（醒目版） ===== -->
        <div id="page2" class="page">
            <div class="symbol-title">🔮 神秘符号</div>
            <div class="symbol-sub">— 星际密码 · 破译中 —</div>

            <div class="symbol-box">
                <div class="ornament">✦ ✦ ✦ ✦ ✦</div>
                <div class="symbol-main">muma_muma_mumuma</div>
                <div class="ornament-bottom">✦ ✦ ✦ ✦ ✦</div>
                <div class="symbol-hint">
                    <span style="color:#ffd700; font-weight:600;">这串符号似乎藏着什么秘密</span>
                    <br>
                    <span class="source-line">—— 来自未知通讯设备的加密信息 ——</span>
                    <span class="action-line">⬇ 破解它 · 找到隐藏的宿主 ⬇</span>
                </div>
            </div>

            <button class="copy-btn" onclick="copySymbol()">📋 复制符号</button>
            <div class="symbol-footer">— 点击复制 —</div>
        </div>

        
            <div class="hint-footer">🧩 破解密码 · 找到隐藏的宿主</div>
        </div>

    </div>

    <script>
        // ============================================================
        //  页面切换
        // ============================================================
        function goToPage(n) {
            document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
            const target = document.getElementById('page' + n);
            if (target) {
                target.classList.add('active');
                target.style.animation = 'none';
                requestAnimationFrame(() => {
                    target.style.animation = 'fadeIn 0.8s ease';
                });
            }
        }

        // ============================================================
        //  复制符号
        // ============================================================
        function copySymbol() {
            const text = 'muma_muma_mumuma';
            navigator.clipboard.writeText(text).then(() => {
                showToast('✅ 已复制！请前往某个通讯设备', 'success');
            }).catch(() => {
                const input = document.createElement('input');
                input.value = text;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                showToast('✅ 已复制！请前往某个通讯设备', 'success');
            });
        }

        // ============================================================
        //  Toast
        // ============================================================
        let toastTimer = null;

        function showToast(msg, type = '') {
            const el = document.getElementById('toast');
            el.textContent = msg;
            el.className = 'toast ' + type;
            void el.offsetWidth;
            el.classList.add('show');
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                el.classList.remove('show');
            }, 3000);
        }

        // ============================================================
        //  启动
        // ============================================================
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🔓 终极通道已开启');
            console.log('🔮 神秘符号: muma_muma_mumuma');
        });
    </script>

</body>
</html>
